<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg" />

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/style.css" />

    <script src="./script/script.js" defer></script>
</head>

<body>

    <header>
        <div>
            <img src="./assets/icons/fotogram_logo.svg" alt="header logo">
        </div>
    </header>

    <main>

        <h1>Your personal photo album</h1>

        <section id="photo-album" class="photo-section">

        </section>

        <dialog id="photo-dialog" class="main-dialog" onmousedown="">
            <div class="top-view">
                <h2 id="photo-name">foto name</h2>
                <button onclick="" id="close-dialog">❌</button>
            </div>

            <img src="" alt="" id="chosen-photo" class="chosen-photo">

            <nav class="view-nav">

                <button onclick="" id="previous-img">
                    <img src="./assets/icons/previous_page_button.svg" alt="previous-button">
                </button>

                <p class="indicator" id="img-number">x/xx</p>

                <button onclick="" id="">
                    <img src="./assets/icons/next_page_button.svg" alt="next-one">
                </button>

            </nav>
        </dialog>

    </main>

    <footer>
        <img src="./assets/icons/developer_akademie_logo.svg" alt="Company-Logo">
        <p>© 2023 Developer Akademie GmbH</p>
    </footer>

</body>

</html>

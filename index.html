<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>

    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg" />

    <link rel="stylesheet" href="./styles/variables.css" />
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./style.css" />

    <script src="./script.js" defer></script>
</head>

<body onload="open_album()">

    <header>
        <div class="f-logo-link">
            <a href="./assets/icons/privacygollum.jpg"><img src="./assets/icons/fotogram_logo.svg" alt="header logo"></a>
        </div>
    </header>

    <main>

        <h1>Your personal photo album</h1>

        <section id="photo-album" class="photo-section">

        </section>

        <dialog id="photo-dialog" class="main-dialog" onmousedown="event.target==this && close_dialog()">
            <div class="top-view">
                <h2 id="photo-name">foto name</h2>
                <button onclick="close_dialog()" id="close-dialog">❌</button>
            </div>

            <img src="" alt="" id="chosen-photo" class="chosen-photo">

            <nav class="view-nav">

                <button onclick="previous_photo()" id="previous-img">
                    <img src="./assets/icons/previous_page_button.svg" alt="previous-button">
                </button>

                <p class="indicator" id="img-number">x/xx</p>

                <button onclick="next_photo()" id="next-img">
                    <img src="./assets/icons/next_page_button.svg" alt="next-one">
                </button>

            </nav>
        </dialog>

    </main>

    <footer>
        <a href="https://developerakademie.com/?utm_source=google&utm_medium=cpc&utm_campaign=S2%20Search%20Brand_new&utm_content=%7BAdGroupName%7D&utm_term=developer%20akademie&hsa_acc=3199679202&hsa_cam=20207938697&hsa_grp=159989510365&hsa_ad=697748504391&hsa_src=g&hsa_tgt=kwd-1135526810540&hsa_kw=developer%20akademie&hsa_mt=e&hsa_net=adwords&hsa_ver=3&gad_source=1&gad_campaignid=20207938697&gbraid=0AAAAADgFy8MmOR_NfsrWtiTyPygi-ovmW&gclid=CjwKCAjwt7XQBhBkEiwAtStpp3poPwwuZpiApKL2YDZ4RQ4uPmAGN_q5nga4EByvQAJ5NRWNlh6uqhoCwaMQAvD_BwE"><img src="./assets/icons/developer_akademie_logo.svg" alt="Company-Logo"></a>
        <p>© 2023 Developer Akademie GmbH</p>
    </footer>

</body>

</html>
